# Gezy — Production Docker Compose (VPS via Arcane)
#
# Cara deploy:
#   Arcane GUI: add stack → paste isi file ini → isi ENCRYPTION_KEY → deploy
#   CLI:        ENCRYPTION_KEY=$(openssl rand -hex 32) docker compose -f docker-compose.prod.yml up -d

services:
  gezy:
    # build langsung dari repo GitHub branch rename/gezy
    image: ghcr.io/gunanto/gezybot:latest
    # build:
    container_name: gezy
    ports:
      - "4178:3000"
    volumes:
      - gezy-data:/app/data
    environment:
      - PORT=3000
      - HOST=0.0.0.0
      - NODE_ENV=production
      - GEZY_DATA_DIR=/app/data
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:?ENCRYPTION_KEY is required}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - GEZY_MODEL_REGISTRY=false
      - GEZY_PUBLIC_URL=https://aios.gezytech.web.id
      - PUBLIC_URL=https://aios.gezytech.web.id
      - TRUSTED_ORIGINS=https://aios.gezytech.web.id
      - GEZY_TIMEZONE=Asia/Jakarta
      - GEZY_ADAPTIVE_THINKING=true
      - OWNER_TELEGRAM_USER_ID=${OWNER_TELEGRAM_USER_ID}
      - ALLOW_ALL_USERS_IN_GROUPS=${ALLOW_ALL_USERS_IN_GROUPS}
      - TELEGRAM_ALLOWED_USERS=${TELEGRAM_ALLOWED_USERS}
      - OWNER_WHATSAPP_USER_ID=${OWNER_WHATSAPP_USER_ID}
      - GEZY_WHATSAPP_ALLOWED_USERS=${GEZY_WHATSAPP_ALLOWED_USERS}
      - GEZY_WHATSAPP_ALLOW_ALL_IN_GROUPS=${GEZY_WHATSAPP_ALLOW_ALL_IN_GROUPS:-false}
    networks:
      - pgunNet
    healthcheck:
      test:
        [
          "CMD",
          "bun",
          "-e",
          "fetch('http://localhost:3000/api/health').then(r => r.ok ? process.exit(0) : process.exit(1)).catch(() => process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    restart: unless-stopped

networks:
  pgunNet:
    external: true

volumes:
  gezy-data:
