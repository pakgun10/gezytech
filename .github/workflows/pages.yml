name: Deploy Sites

on:
  push:
    branches:
      - main
    paths:
      - 'site/**'
      - 'docs-site/**'
  schedule:
    # Daily, refresh stars/version on the live site.
    - cron: '17 6 * * *'
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    name: Build and deploy sites
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.13"

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Cache Bun dependencies
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: bun-site-${{ runner.os }}-${{ hashFiles('site/bun.lock') }}
          restore-keys: |
            bun-site-${{ runner.os }}-

      - name: Cache npm dependencies
        uses: actions/cache@v5
        with:
          path: ~/.npm
          key: npm-docs-${{ runner.os }}-${{ hashFiles('docs-site/package-lock.json') }}
          restore-keys: |
            npm-docs-${{ runner.os }}-

      - name: Refresh project health stats
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p site/src/data
          # One inline Bun script fans out to the GitHub REST API and writes the
          # full health snapshot. Every fetch is best-effort: a failure falls
          # back to a safe placeholder so the site always builds (the committed
          # site/src/data/stats.json is the build-time default before CI runs).
          bun run - <<'TS' > site/src/data/stats.json
          const REPO = 'MarlBurroW/hivekeep'
          const API = 'https://api.github.com'
          const token = process.env.GH_TOKEN || ''

          async function gh<T>(path: string, fallback: T): Promise<T> {
            try {
              const res = await fetch(`${API}${path}`, {
                headers: {
                  Accept: 'application/vnd.github+json',
                  'X-GitHub-Api-Version': '2022-11-28',
                  'User-Agent': 'hivekeep-site-stats',
                  ...(token ? { Authorization: `Bearer ${token}` } : {}),
                },
              })
              if (!res.ok) return fallback
              return (await res.json()) as T
            } catch {
              return fallback
            }
          }

          // Fallback version from the repo's package.json (strip a leading v).
          let pkgVersion = '0.0.0'
          try {
            pkgVersion = String(
              JSON.parse(await Bun.file('package.json').text()).version || pkgVersion,
            )
          } catch {}

          const [repo, release, commits, contributors, runs] = await Promise.all([
            gh<any>(`/repos/${REPO}`, {}),
            gh<any>(`/repos/${REPO}/releases/latest`, {}),
            gh<any[]>(`/repos/${REPO}/commits?sha=main&per_page=10`, []),
            // ?anon=0&per_page=1 + Link header would give the precise count, but
            // the contributors list (capped) is enough for a count + avatars.
            gh<any[]>(`/repos/${REPO}/contributors?per_page=100`, []),
            gh<any>(`/repos/${REPO}/actions/workflows/ci.yml/runs?branch=main&per_page=1`, {}),
          ])

          const stars: number = Number(repo?.stargazers_count) || 0

          // repo.open_issues_count counts PRs too. Use the search API to get the
          // issue-only count (state:open is:issue), falling back to the repo
          // field if search is unavailable.
          let openIssues = 0
          const issueSearch = await gh<any>(
            `/search/issues?q=${encodeURIComponent(`repo:${REPO} is:issue is:open`)}&per_page=1`,
            null,
          )
          if (issueSearch && typeof issueSearch.total_count === 'number') {
            openIssues = issueSearch.total_count
          } else if (typeof repo?.open_issues_count === 'number') {
            openIssues = repo.open_issues_count
          }

          const latestTag: string = release?.tag_name || ''
          const version = latestTag ? latestTag.replace(/^v/, '') : pkgVersion
          const latestReleaseName: string = release?.name || latestTag || ''
          const latestReleaseUrl: string =
            release?.html_url || `https://github.com/${REPO}/releases`

          const lastCommitISO: string | null =
            Array.isArray(commits) && commits[0]
              ? commits[0]?.commit?.committer?.date ||
                commits[0]?.commit?.author?.date ||
                null
              : null

          // Contributors API excludes bots in practice for this repo; keep a
          // light guard anyway and surface the top few with avatars.
          const realContributors = (Array.isArray(contributors) ? contributors : []).filter(
            (c) => c && c.type !== 'Bot',
          )
          const contributorsCount = realContributors.length
          const topContributors = realContributors.slice(0, 5).map((c) => ({
            login: String(c.login || ''),
            avatarUrl: String(c.avatar_url || ''),
            htmlUrl: String(c.html_url || ''),
          }))

          const lastRun = Array.isArray(runs?.workflow_runs) ? runs.workflow_runs[0] : null
          // conclusion is null while a run is in progress; report 'success' /
          // 'failure' / '' (unknown) so the UI can pick a colour.
          const ciStatus: string = lastRun?.conclusion || ''

          // Prefer the release notes (first few non-empty lines); otherwise the
          // last few commit subjects. Keep it short.
          let changelog: string[] = []
          const body: string = (release?.body || '').trim()
          if (body) {
            changelog = body
              .split(/\r?\n/)
              .map((l) => l.replace(/^[-*#>\s]+/, '').trim())
              .filter(Boolean)
              .slice(0, 5)
          }
          if (changelog.length === 0 && Array.isArray(commits)) {
            changelog = commits
              .map((c) => String(c?.commit?.message || '').split('\n')[0].trim())
              .filter(Boolean)
              .slice(0, 5)
          }

          const out = {
            stars,
            version,
            latestReleaseName,
            latestReleaseUrl,
            openIssues,
            contributors: contributorsCount,
            topContributors,
            lastCommitISO,
            ciStatus,
            changelog,
            fetchedAt: new Date().toISOString(),
          }
          process.stdout.write(JSON.stringify(out, null, 2) + '\n')
          TS

          echo "Wrote site/src/data/stats.json:"
          cat site/src/data/stats.json

      - name: Refresh npm plugins list
        # Best-effort: the script keeps the committed plugins.json on any
        # failure or empty result, so the site always builds with real content.
        run: bun site/scripts/fetch-plugins.mjs

      - name: Build landing site
        run: cd site && bun install --frozen-lockfile && bun run build

      - name: Build docs site
        run: cd docs-site && npm ci && npm run build

      - name: Merge outputs
        run: |
          mkdir -p merged
          cp -r site/dist/* merged/
          mkdir -p merged/docs
          cp -r docs-site/dist/* merged/docs/
          touch merged/.nojekyll

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: merged
          single-commit: true
          commit-message: 'chore: update sites'
