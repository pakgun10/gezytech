name: Build and Deploy

on:
  push:
    branches: [master, main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build frontend
        run: bun run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 1

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Copy dist to VPS
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          source: "dist/*"
          target: "/home/pgun/gezytech/dist"
          strip_components: 0
          overwrite: true

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          timeout: 5m
          command_timeout: 10m
          script: |
            set -e
            export PATH="$HOME/.bun/bin:$HOME/.npm-global/bin:/usr/bin:$PATH"

            cd /home/pgun/gezytech

            echo "Pulling latest code..."
            git pull origin master

            echo "Installing dependencies..."
            bun install

            echo "Running database migrations..."
            bun run db:migrate

            echo "Ensuring PM2 processes are running..."
            pm2 describe gezytech >/dev/null 2>&1 || pm2 start start-pm2.sh --name gezytech --interpreter none --cwd /home/pgun/gezytech
            pm2 describe public-app >/dev/null 2>&1 || pm2 start /home/pgun/gezytech/public-app/start-pm2.sh --name public-app --interpreter none --cwd /home/pgun/gezytech/public-app
            pm2 describe platform-app >/dev/null 2>&1 || pm2 start /home/pgun/gezytech/platform-app/start-pm2.sh --name platform-app --interpreter none --cwd /home/pgun/gezytech/platform-app

            echo "Restarting services..."
            pm2 restart gezytech
            pm2 restart public-app
            pm2 restart platform-app
            pm2 save

            echo "Deployment complete."
