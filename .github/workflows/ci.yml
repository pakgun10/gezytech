name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - 'site/**'
      - 'docs-site/**'
      - '**.md'
      - 'LICENSE'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'site/**'
      - 'docs-site/**'
      - '**.md'
      - 'LICENSE'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Typecheck, Test & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.13"

      - name: Cache Bun dependencies
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Install dependencies
        run: bun install --frozen-lockfile
        env:
          HUSKY: 0

      - name: Type check
        run: bun run typecheck

      - name: Test
        run: bun run test

      - name: Build
        run: bun run build

  docker:
    name: Validate Docker image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build image (amd64, no push)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64
          push: false
          load: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  scripts:
    name: Validate shell scripts
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Syntax check (bash -n)
        run: |
          bash -n install.sh
          bash -n docker/entrypoint.sh

      # ShellCheck the two shipped scripts only. severity:error means style/info
      # findings never fail the build. ignore_paths excludes vendored/tooling
      # scripts (husky, opencode patches, claude worktrees, node_modules) so the
      # scan effectively covers install.sh + docker/entrypoint.sh.
      - name: ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          severity: error
          scandir: '.'
          ignore_paths: node_modules .husky opencode .claude site docs-site
